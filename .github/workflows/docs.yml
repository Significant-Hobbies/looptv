name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'CLAUDE.md'
      - 'scripts/validate-docs.mjs'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'CLAUDE.md'
      - 'scripts/validate-docs.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Validate docs (links, orphans, indexes)
        run: node scripts/validate-docs.mjs --strict
